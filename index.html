<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Game</title>

    <link rel="stylesheet" href="index.css">
</head>

<body>

    <h1>Bat Ball Stump Game</h1>

    <button class="choice-button" onclick="
        let computerChoice = generateComputerChoice();
        let resultMsg = getResult('Bat', computerChoice);
        showResult('Bat', computerChoice, resultMsg);
    ">
        <img src="image/bat.png" alt="Bat" class="choice-image">
    </button>

    <button class="choice-button" onclick="
        let computerChoice = generateComputerChoice();
        let resultMsg = getResult('Ball', computerChoice);
        showResult('Ball', computerChoice, resultMsg);
    ">
        <img src="image/ball.png" alt="Ball" class="choice-image">
    </button>

    <button class="choice-button" onclick="
        let computerChoice = generateComputerChoice();
        let resultMsg = getResult('Stump', computerChoice);
        showResult('Stump', computerChoice, resultMsg);
    ">
        <img src="image/stump.png" alt="Stump" class="choice-image">
    </button>

    <h3 id="user-move"></h3>
    <h3 id="computer-move"></h3>
    <h3 id="result"></h3>
    <h3 id="score"></h3>

    <button onclick="
        localStorage.clear();
        resetScore();
    ">Reset</button>

    <script>
        let scoreStr = localStorage.getItem("Score");
        let score;

        resetScore(scoreStr);

        function resetScore(scoreStr) {
            score = scoreStr ? JSON.parse(scoreStr) : {
                win: 0,
                lost: 0,
                tie: 0
            };

            score.displayScore = function () {
                return `Won: ${score.win} | Lost: ${score.lost} | Tie: ${score.tie}`;
            };

            showResult();
        }

        function generateComputerChoice() {
            let randomNumber = Math.random() * 3;

            if (randomNumber <= 1) {
                return "Bat";
            } else if (randomNumber <= 2) {
                return "Ball";
            } else {
                return "Stump";
            }
        }

        function getResult(userMove, computerMove) {

            if (userMove === "Bat") {

                if (computerMove === "Bat") {
                    score.tie++;
                    return "It's a Tie!";
                } else if (computerMove === "Ball") {
                    score.win++;
                    return "You Won!";
                } else {
                    score.lost++;
                    return "Computer Won!";
                }

            } else if (userMove === "Ball") {

                if (computerMove === "Ball") {
                    score.tie++;
                    return "It's a Tie!";
                } else if (computerMove === "Bat") {
                    score.lost++;
                    return "Computer Won!";
                } else {
                    score.win++;
                    return "You Won!";
                }

            } else {

                if (computerMove === "Bat") {
                    score.win++;
                    return "You Won!";
                } else if (computerMove === "Ball") {
                    score.lost++;
                    return "Computer Won!";
                } else {
                    score.tie++;
                    return "It's a Tie!";
                }

            }
        }

        function showResult(userMove, computerMove, result) {

            localStorage.setItem("Score", JSON.stringify(score));

            document.getElementById("user-move").innerText =
                userMove ? `You chose: ${userMove}` : "";

            document.getElementById("computer-move").innerText =
                computerMove ? `Computer chose: ${computerMove}` : "";

            document.getElementById("result").innerText =
                result || "";

            document.getElementById("score").innerText =
                score.displayScore();
        }
    </script>

</body>

</html>
